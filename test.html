<!DOCTYPE html>
<html>
<head>
    <title>JavaScript Calculator</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #f4f4f4;
        }

        .calculator {
            background-color: #333;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
            width: 300px;
        }

        .display {
            width: 100%;
            height: 60px;
            background-color: #222;
            color: #fff;
            font-size: 2rem;
            text-align: right;
            border: none;
            border-radius: 5px;
            padding: 10px;
            box-sizing: border-box;
            margin-bottom: 15px;
        }

        .buttons {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
        }

        button {
            padding: 15px;
            font-size: 1.2rem;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            background-color: #e0e0e0;
            transition: background-color 0.2s;
        }

        button:hover {
            background-color: #d4d4d4;
        }

        .operator {
            background-color: #ff9f0a;
            color: white;
        }

        .operator:hover {
            background-color: #cc7f08;
        }

        .clear {
            background-color: #ff3b30;
            color: white;
        }

        .clear:hover {
            background-color: #cc2f26;
        }
    </style>
</head>
<body>

<div class="calculator">
    <input type="text" id="display" class="display" value="0" disabled>

    <div class="buttons">
        <button class="clear" onclick="clearDisplay()">C</button>
        <button class="operator" onclick="appendOperator('/')">÷</button>
        <button class="operator" onclick="appendOperator('*')">×</button>
        <button class="operator" onclick="appendOperator('-')">−</button>

        <button onclick="appendNumber('7')">7</button>
        <button onclick="appendNumber('8')">8</button>
        <button onclick="appendNumber('9')">9</button>
        <button class="operator" onclick="appendOperator('+')">+</button>

        <button onclick="appendNumber('4')">4</button>
        <button onclick="appendNumber('5')">5</button>
        <button onclick="appendNumber('6')">6</button>
        <button class="operator" style="grid-row: span 2; height: 100%;" onclick="calculate()">=</button>

        <button onclick="appendNumber('1')">1</button>
        <button onclick="appendNumber('2')">2</button>
        <button onclick="appendNumber('3')">3</button>

        <button onclick="appendNumber('0')" style="grid-column: span 2;">0</button>
        <button onclick="appendNumber('.')">.</button>
    </div>
</div>

<script>
    const display = document.getElementById('display');
    let shouldResetDisplay = false;

    function appendNumber(number) {
        if (display.value === '0' || shouldResetDisplay) {
            display.value = number;
            shouldResetDisplay = false;
        } else {
            if (number === '.' && display.value.includes('.')) return;
            display.value += number;
        }
    }

    function appendOperator(operator) {
        shouldResetDisplay = false;
        const lastChar = display.value.slice(-1);
        
        if (['+', '-', '*', '/'].includes(lastChar)) {
            display.value = display.value.slice(0, -1) + operator;
        } else {
            display.value += operator;
        }
    }

    function clearDisplay() {
        display.value = '0';
    }

    function calculate() {
        try {
            if (display.value.includes('/0')) {
                display.value = "Error: Div by 0";
                shouldResetDisplay = true;
                return;
            }

            let result = eval(display.value);
            display.value = Number(result.toFixed(8)).toString();
            shouldResetDisplay = true;
        } catch (error) {
            display.value = "Error";
            shouldResetDisplay = true;
        }
    }
</script>

</body>
</html>
